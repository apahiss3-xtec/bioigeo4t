<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Divisió cel·lular · Mitosi i Meiosi · IE Temple · 4t ESO</title>
<link href="https://fonts.googleapis.com/css2?family=Fira+Sans+Extra+Condensed:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --purple: #c084fc;
  --purple-ink: #5a4aa0;
  --purple-deep: #7B68C8;
  --ink: #1A1A2E;
  --ink-2: #4A3F3F;
  --muted: #666666;
  --surface: #fdfafb;
  --rule: #EAE6F6;
  --rule-dark: #C8C2DD;
  --teal: #81c3c3;
  --teal-tint: #EAF3F8;
  --yellow-tint: #FFF9E0;
  --purple-tint: #EFEAF5;
  --green-tint: #EAF4EB;
  --peach-tint: #FBEEE0;
  --chr1: #E76F6F;
  --chr2: #6FA3E7;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Fira Sans Extra Condensed', sans-serif;
  background: var(--surface);
  color: var(--ink-2);
  min-height: 100vh;
}

/* ── HEADER ─────────────────────────────────────── */
header {
  background: var(--purple-ink);
  padding: 14px 24px 12px;
  display: flex; align-items: center; justify-content: space-between;
  gap: 16px;
}
.header-left { display: flex; flex-direction: column; }
.header-eyebrow {
  font-size: 11px; font-weight: 700; color: var(--purple);
  letter-spacing: .1em; text-transform: uppercase;
}
.header-title { font-size: 22px; font-weight: 700; color: #fff; line-height: 1.1; }
.header-right { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }

.lang-btn, .simplify-btn {
  font-family: 'Fira Sans Extra Condensed', sans-serif;
  font-size: 12px; font-weight: 700; letter-spacing: .06em;
  text-transform: uppercase; cursor: pointer;
  border: none; border-radius: 9999px;
  padding: 5px 14px; transition: all .2s;
}
.simplify-btn {
  background: var(--yellow-tint); color: var(--purple-ink);
}
.simplify-btn:hover { background: #f9dc5c; }
.simplify-btn.active { background: #f9dc5c; box-shadow: 0 0 0 2px var(--purple-ink); }

.lang-btn { background: rgba(255,255,255,.12); color: #fff; }
.lang-btn:hover { background: rgba(255,255,255,.22); }
.lang-btn.active { background: var(--purple); color: var(--ink); }

/* ── MODE TOGGLE ────────────────────────────────── */
.mode-bar {
  display: flex; align-items: stretch; gap: 0;
  border-bottom: 2px solid var(--rule);
  background: var(--surface);
}
.mode-tab {
  font-family: 'Fira Sans Extra Condensed', sans-serif;
  font-size: 18px; font-weight: 700; cursor: pointer;
  padding: 12px 32px; border: none; background: transparent;
  color: var(--muted); letter-spacing: .05em;
  border-bottom: 3px solid transparent; margin-bottom: -2px;
  transition: all .2s; text-transform: uppercase;
}
.mode-tab:hover { color: var(--purple-deep); }
.mode-tab.active {
  color: var(--purple-ink);
  border-bottom-color: var(--purple-ink);
  background: var(--purple-tint);
}
.mode-badge {
  display: inline-block; font-size: 11px; font-weight: 400;
  background: var(--rule); color: var(--muted);
  border-radius: 9999px; padding: 1px 8px; margin-left: 6px;
  vertical-align: middle;
}
.mode-tab.active .mode-badge {
  background: var(--purple-deep); color: #fff;
}

/* ── LAYOUT ─────────────────────────────────────── */
.app-body {
  display: grid;
  grid-template-columns: 1fr 340px;
  grid-template-rows: auto 1fr;
  min-height: calc(100vh - 100px);
}

/* ── PHASE TIMELINE ─────────────────────────────── */
.phase-timeline {
  grid-column: 1 / -1;
  display: flex; align-items: center; gap: 0;
  padding: 16px 20px;
  overflow-x: auto;
  border-bottom: 1px solid var(--rule);
  background: #fff;
}
.phase-btn {
  font-family: 'Fira Sans Extra Condensed', sans-serif;
  font-size: 13px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .05em; cursor: pointer;
  padding: 8px 16px; border: 2px solid var(--rule);
  background: var(--surface); color: var(--muted);
  border-radius: 8px; white-space: nowrap;
  transition: all .2s; position: relative;
  flex-shrink: 0;
}
.phase-btn:hover { border-color: var(--purple-deep); color: var(--purple-deep); }
.phase-btn.active {
  background: var(--purple-ink); color: #fff;
  border-color: var(--purple-ink);
}
.phase-arrow {
  font-size: 16px; color: var(--rule-dark); flex-shrink: 0; padding: 0 4px;
}
.phase-divider {
  font-size: 10px; font-weight: 700; color: var(--teal);
  letter-spacing: .08em; text-transform: uppercase;
  background: var(--teal-tint); border-radius: 4px; padding: 3px 8px;
  flex-shrink: 0; margin: 0 6px;
}

/* ── CELL CANVAS ────────────────────────────────── */
.cell-canvas {
  display: flex; align-items: center; justify-content: center;
  padding: 32px 24px;
  background: var(--surface);
  position: relative; overflow: hidden;
  min-height: 440px;
}
.cell-canvas::before {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at 30% 30%, rgba(192,132,252,.06) 0%, transparent 60%),
              radial-gradient(ellipse at 70% 70%, rgba(129,195,195,.05) 0%, transparent 60%);
  pointer-events: none;
}

.cell-diagram {
  max-width: 100%; max-height: 360px;
  transition: opacity .3s ease;
}

/* ── PHASE LABEL ────────────────────────────────── */
.phase-label-area {
  padding: 12px 24px 4px;
  background: var(--surface);
  border-top: 1px solid var(--rule);
}
.phase-label-eyebrow {
  font-size: 11px; font-weight: 700; letter-spacing: .1em;
  text-transform: uppercase; color: var(--purple-deep);
}
.phase-label-title {
  font-size: 32px; font-weight: 700; color: var(--ink); line-height: 1.05;
}
.phase-label-notation {
  display: inline-block;
  font-size: 14px; font-weight: 700; letter-spacing: .06em;
  background: var(--purple-ink); color: #fff;
  border-radius: 6px; padding: 2px 10px; margin-top: 4px;
}

/* ── SIDE INFO ──────────────────────────────────── */
.side-info {
  grid-row: 2 / 4;
  border-left: 1px solid var(--rule);
  padding: 20px;
  background: #fff;
  overflow-y: auto;
  display: flex; flex-direction: column; gap: 16px;
}
.info-section-title {
  font-size: 11px; font-weight: 700; letter-spacing: .1em;
  text-transform: uppercase; color: var(--purple-ink);
  border-bottom: 1px solid var(--rule); padding-bottom: 6px; margin-bottom: 4px;
}
.info-text {
  font-size: 16px; line-height: 1.55; color: var(--ink-2);
}
.info-text.simplified {
  font-size: 17px; line-height: 1.6; color: var(--ink);
  font-weight: 400;
}

.key-points { list-style: none; display: flex; flex-direction: column; gap: 8px; }
.key-point {
  display: flex; align-items: flex-start; gap: 10px;
  font-size: 15px; color: var(--ink-2); line-height: 1.45;
}
.key-point::before {
  content: '→';
  color: var(--purple-deep); font-weight: 700; flex-shrink: 0; margin-top: 1px;
}

.chromosome-legend {
  background: var(--purple-tint); border-radius: 8px; padding: 12px;
}
.legend-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; font-size: 14px; }
.legend-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }

.notation-badge {
  display: inline-block; font-size: 13px; font-weight: 700;
  background: var(--purple-ink); color: #fff;
  border-radius: 6px; padding: 2px 10px; margin-top: 6px;
}

.compare-table {
  width: 100%; border-collapse: collapse; font-size: 14px;
}
.compare-table th {
  background: var(--purple-ink); color: #fff; padding: 8px 10px;
  text-align: left; font-size: 12px; letter-spacing: .06em; text-transform: uppercase;
}
.compare-table td {
  padding: 7px 10px; border-bottom: 1px solid var(--rule); color: var(--ink-2);
}
.compare-table tr:nth-child(even) td { background: var(--purple-tint); }

/* ── TOOLTIP SISTEMA MULTILINGÜE ─────────────────── */
.tr-word {
  cursor: help;
  border-bottom: 1px dashed var(--purple-deep);
  position: relative; display: inline;
}
.tr-word .tooltip-box {
  display: none; position: absolute; bottom: 120%; left: 50%; transform: translateX(-50%);
  background: var(--purple-ink); color: #fff;
  font-size: 14px; font-weight: 700; padding: 4px 10px;
  border-radius: 6px; white-space: nowrap; z-index: 100;
  pointer-events: none;
}
.tr-word .tooltip-box::after {
  content: ''; position: absolute; top: 100%; left: 50%;
  transform: translateX(-50%); border: 5px solid transparent;
  border-top-color: var(--purple-ink);
}
.lang-ar .tr-word .tooltip-ar,
.lang-es .tr-word .tooltip-es,
.lang-ur .tr-word .tooltip-ur { display: block; }

/* ── COMPARISON VIEW ────────────────────────────── */
.comparison-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 20px; padding: 20px;
}
.comparison-cell {
  background: #fff; border: 1px solid var(--rule); border-radius: 12px;
  overflow: hidden;
}
.comparison-header {
  background: var(--purple-ink); color: #fff;
  padding: 10px 16px; font-size: 16px; font-weight: 700; letter-spacing: .05em;
  text-transform: uppercase;
}
.comparison-content { padding: 16px; display: flex; flex-direction: column; gap: 10px; }

/* ── ANIMATIONS ─────────────────────────────────── */
@keyframes fadeIn { from { opacity: 0; transform: scale(.96); } to { opacity: 1; transform: scale(1); } }
.cell-diagram { animation: fadeIn .35s ease; }

@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .6; } }
.chromosome-pulse { animation: pulse 2s ease-in-out infinite; }

/* ── NAV BOTTOM ─────────────────────────────────── */
.bottom-nav {
  grid-column: 1 / 2;
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 24px;
  border-top: 1px solid var(--rule);
  background: var(--surface);
}
.nav-btn {
  font-family: 'Fira Sans Extra Condensed', sans-serif;
  font-size: 15px; font-weight: 700; letter-spacing: .04em;
  cursor: pointer; border: 2px solid var(--purple-ink);
  border-radius: 8px; padding: 8px 20px;
  background: transparent; color: var(--purple-ink);
  transition: all .2s;
}
.nav-btn:hover { background: var(--purple-ink); color: #fff; }
.nav-btn:disabled { opacity: .3; cursor: not-allowed; }
.nav-btn.primary { background: var(--purple-ink); color: #fff; }
.nav-btn.primary:hover { background: var(--purple-deep); border-color: var(--purple-deep); }

.step-counter {
  font-size: 14px; color: var(--muted); letter-spacing: .05em;
  text-transform: uppercase;
}

/* ── SCROLLBAR ──────────────────────────────────── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--rule); }
::-webkit-scrollbar-thumb { background: var(--rule-dark); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <span class="header-eyebrow">Biologia i Geologia · 4t ESO · IE Temple · SA2 «La cèl·lula»</span>
    <span class="header-title">Divisió cel·lular: Mitosi i Meiosi</span>
  </div>
  <div class="header-right">
    <button class="simplify-btn" id="btnSimplify" onclick="toggleSimplify()">Simplifica</button>
    <button class="lang-btn" id="btnAr" onclick="setLang('ar')">عربي</button>
    <button class="lang-btn" id="btnEs" onclick="setLang('es')">Castellano</button>
    <button class="lang-btn" id="btnUr" onclick="setLang('ur')">اردو</button>
  </div>
</header>

<!-- Mode tabs -->
<div class="mode-bar">
  <button class="mode-tab active" id="tabMitosi" onclick="setMode('mitosi')">
    Mitosi <span class="mode-badge">6 fases</span>
  </button>
  <button class="mode-tab" id="tabMeiosi" onclick="setMode('meiosi')">
    Meiosi <span class="mode-badge">10 fases</span>
  </button>
  <button class="mode-tab" id="tabCompara" onclick="setMode('compara')">
    Compara
  </button>
</div>

<!-- Phase timeline -->
<div class="phase-timeline" id="phaseTimeline"></div>

<!-- Main layout -->
<div class="app-body" id="appBody">
  <!-- Cell canvas -->
  <div class="cell-canvas" id="cellCanvas">
    <svg id="cellSvg" class="cell-diagram" viewBox="0 0 400 320" xmlns="http://www.w3.org/2000/svg" width="400" height="320"></svg>
  </div>

  <!-- Phase label -->
  <div class="phase-label-area" id="phaseLabelArea">
    <div class="phase-label-eyebrow" id="phaseEyebrow"></div>
    <div class="phase-label-title" id="phaseTitle"></div>
    <div id="phaseNotation"></div>
  </div>

  <!-- Side info -->
  <div class="side-info" id="sideInfo"></div>

  <!-- Bottom nav -->
  <div class="bottom-nav">
    <button class="nav-btn" id="btnPrev" onclick="navigate(-1)">← Anterior</button>
    <span class="step-counter" id="stepCounter"></span>
    <button class="nav-btn primary" id="btnNext" onclick="navigate(1)">Següent →</button>
  </div>
</div>

<script>
// ─────────────────────────────────────────────────
// SVG DRAWING FUNCTIONS
// ─────────────────────────────────────────────────

const colors = {
  membrane: '#7B68C8',
  nuclearMembrane: '#5a4aa0',
  chr1a: '#E76F6F',
  chr2a: '#6FA3E7',
  spindle: '#C8C2DD',
  cellFill: 'rgba(239,234,245,0.3)',
  nucleusFill: 'rgba(239,234,245,0.5)',
};

function cellBase(cx, cy, rx, ry, fill = colors.cellFill) {
  return `<ellipse cx="${cx}" cy="${cy}" rx="${rx}" ry="${ry}" fill="${fill}" stroke="${colors.membrane}" stroke-width="3"/>`;
}

function nucleus(cx, cy, r) {
  return `<circle cx="${cx}" cy="${cy}" r="${r}" fill="${colors.nucleusFill}" stroke="${colors.nuclearMembrane}" stroke-width="2"/>`;
}

function chromatin(cx, cy) {
  return `
    <path d="M${cx-20},${cy-10} Q${cx-5},${cy+10} ${cx+15},${cy}" stroke="${colors.chr1a}" stroke-width="2.5" fill="none" opacity=".7"/>
    <path d="M${cx+20},${cy-15} Q${cx+5},${cy+5} ${cx-10},${cy+10}" stroke="${colors.chr2a}" stroke-width="2.5" fill="none" opacity=".7"/>
    <path d="M${cx-15},${cy+5} Q${cx},${cy-8} ${cx+10},${cy+15}" stroke="#6FBE7A" stroke-width="2" fill="none" opacity=".6"/>
  `;
}

function chromosome(cx, cy, color, angle = 0, condensed = true, w = 10, h = 28) {
  const dx = condensed ? 4 : 0;
  return `
    <g transform="translate(${cx},${cy}) rotate(${angle})">
      <rect x="${-dx/2-w/2}" y="${-h/2}" width="${w/2+dx/4}" height="${h}" rx="4" fill="${color}" opacity=".85"/>
      <rect x="${dx/4}" y="${-h/2}" width="${w/2+dx/4}" height="${h}" rx="4" fill="${color}" opacity=".7"/>
      <line x1="${-dx/2}" y1="0" x2="${dx/2}" y2="0" stroke="${color}" stroke-width="1.5" opacity=".5"/>
    </g>
  `;
}

function chromosomeSingle(cx, cy, color, angle = 0, w = 8, h = 24) {
  return `
    <g transform="translate(${cx},${cy}) rotate(${angle})">
      <rect x="${-w/2}" y="${-h/2}" width="${w}" height="${h}" rx="4" fill="${color}" opacity=".85"/>
    </g>
  `;
}

function spindleFibers(cx, cy, chr_positions, poleTy = 60, poleBy = 260) {
  let lines = '';
  chr_positions.forEach(p => {
    lines += `<line x1="${cx}" y1="${poleTy}" x2="${p[0]}" y2="${p[1]}" stroke="${colors.spindle}" stroke-width="1" opacity=".6"/>`;
    lines += `<line x1="${cx}" y1="${poleBy}" x2="${p[0]}" y2="${p[1]}" stroke="${colors.spindle}" stroke-width="1" opacity=".6"/>`;
  });
  return lines;
}

// ── MITOSI ─────────────────────────────────────────────

function drawInterfase(cx = 200, cy = 160) {
  return `
    ${cellBase(cx, cy, 130, 110)}
    ${nucleus(cx, cy, 50)}
    ${chromatin(cx, cy)}
    <text x="${cx}" y="${cy+140}" text-anchor="middle" font-family="Fira Sans Extra Condensed" font-size="13" fill="#666">ADN copiat (cromosomes no condensats)</text>
    <text x="${cx}" y="${cy+156}" text-anchor="middle" font-family="Fira Sans Extra Condensed" font-size="12" fill="${colors.membrane}" font-weight="bold">2n (amb còpies → 2 × 2n)</text>
  `;
}

function drawProfase(cx = 200, cy = 155) {
  return `
    ${cellBase(cx, cy, 130, 110)}
    <circle cx="${cx}" cy="${cy}" r="50" fill="none" stroke="${colors.nuclearMembrane}" stroke-width="1.5" stroke-dasharray="5,4" opacity=".4"/>
    ${chromosome(cx-30, cy-20, colors.chr1a, -15)}
    ${chromosome(cx-15, cy+20, colors.chr1a, 10)}
    ${chromosome(cx+25, cy-15, colors.chr2a, 15)}
    ${chromosome(cx+10, cy+25, colors.chr2a, -10)}
    <text x="${cx}" y="${cy+140}" text-anchor="middle" font-family="Fira Sans Extra Condensed" font-size="13" fill="#666">Cromosomes condensats, membrana nuclear es trenca</text>
    <text x="${cx}" y="${cy+156}" text-anchor="middle" font-family="Fira Sans Extra Condensed" font-size="12" fill="${colors.membrane}" font-weight="bold">2n (cromàtides germanes unides)</text>
  `;
}

function drawMetafase(cx = 200, cy = 155) {
  const spindles = [[cx-30, cy], [cx-15, cy], [cx+15, cy], [cx+30, cy]];
  return `
    ${cellBase(cx, cy, 130, 110)}
    ${spindleFibers(cx, cy, spindles, cy-100, cy+100)}
    ${chromosome(cx-28, cy, colors.chr1a, 90, true, 10, 28)}
    ${chromosome(cx-14, cy, colors.chr1a, 90, true, 10, 28)}
    ${chromosome(cx+14, cy, colors.chr2a, 90, true, 10, 28)}
    ${chromosome(cx+28, cy, colors.chr2a, 90, true, 10, 28)}
    <line x1="${cx-70}" y1="${cy}" x2="${cx+70}" y2="${cy}" stroke="${colors.nuclearMembrane}" stroke-width="1" stroke-dasharray="3,3" opacity=".4"/>
    <text x="${cx}" y="${cy+140}" text-anchor="middle" font-family="Fira Sans Extra Condensed" font-size="13" fill="#666">Cromosomes a l'equador (placa metafàsica)</text>
    <text x="${cx}" y="${cy+156}" text-anchor="middle" font-family="Fira Sans Extra Condensed" font-size="12" fill="${colors.membrane}" font-weight="bold">2n (cromàtides germanes unides)</text>
  `;
}

function drawAnafase(cx = 200, cy = 155) {
  return `
    ${cellBase(cx, cy, 130, 130)}
    ${chromosomeSingle(cx-25, cy-50, colors.chr1a, 90)}
    ${chromosomeSingle(cx-10, cy-50, colors.chr1a, 90)}
    ${chromosomeSingle(cx+10, cy-50, colors.chr2a, 90)}
    ${chromosomeSingle(cx+25, cy-50, colors.chr2a, 90)}
    ${chromosomeSingle(cx-25, cy+50, colors.chr1a, 90)}
    ${chromosomeSingle(cx-10, cy+50, colors.chr1a, 90)}
    ${chromosomeSingle(cx+10, cy+50, colors.chr2a, 90)}
    ${chromosomeSingle(cx+25, cy+50, colors.chr2a, 90)}
    <line x1="${cx-80}" y1="${cy}" x2="${cx+80}" y2="${cy}" stroke="${colors.spindle}" stroke-width="1" stroke-dasharray="4,3" opacity=".4"/>
    <text x="${cx}" y="${cy+152}" text-anchor="middle" font-family="Fira Sans Extra Condensed" font-size="13" fill="#666">Cromàtides germanes separen cap als pols</text>
    <text x="${cx}" y="${cy+168}" text-anchor="middle" font-family="Fira Sans Extra Condensed" font-size="12" fill="${colors.membrane}" font-weight="bold">4n transitòriament (cap pol: 2n)</text>
  `;
}

function drawTelofase(cx = 200, cy = 155) {
  return `
    ${cellBase(cx, cy, 130, 130)}
    <ellipse cx="${cx}" cy="${cy-60}" rx="55" ry="38" fill="${colors.nucleusFill}" stroke="${colors.nuclearMembrane}" stroke-width="2"/>
    <ellipse cx="${cx}" cy="${cy+60}" rx="55" ry="38" fill="${colors.nucleusFill}" stroke="${colors.nuclearMembrane}" stroke-width="2"/>
    ${chromatin(cx, cy-62)}
    ${chromatin(cx, cy+58)}
    <line x1="${cx-80}" y1="${cy}" x2="${cx+80}" y2="${cy}" stroke="${colors.membrane}" stroke-width="2" stroke-dasharray="6,4" opacity=".5"/>
    <text x="${cx}" y="${cy+152}" text-anchor="middle" font-family="Fira Sans Extra Condensed" font-size="13" fill="#666">Dos nuclis nous es formen, cèl·lula s'allarga</text>
    <text x="${cx}" y="${cy+168}" text-anchor="middle" font-family="Fira Sans Extra Condensed" font-size="12" fill="${colors.membrane}" font-weight="bold">Cada pol: 2n</text>
  `;
}

function drawCitoquinesi(cx = 200, cy = 155) {
  return `
    <ellipse cx="${cx}" cy="${cy-62}" rx="110" ry="78" fill="${colors.cellFill}" stroke="${colors.membrane}" stroke-width="3"/>
    <ellipse cx="${cx}" cy="${cy+62}" rx="110" ry="78" fill="${colors.cellFill}" stroke="${colors.membrane}" stroke-width="3"/>
    ${nucleus(cx, cy-62, 38)}
    ${nucleus(cx, cy+62, 38)}
    ${chromatin(cx, cy-68)}
    ${chromatin(cx, cy+56)}
    <text x="${cx}" y="${cy+152}" text-anchor="middle" font-family="Fira Sans Extra Condensed" font-size="13" fill="#666">Citoplasma es divideix → 2 cèl·lules filles</text>
    <text x="${cx}" y="${cy+168}" text-anchor="middle" font-family="Fira Sans Extra Condensed" font-size="12" fill="${colors.membrane}" font-weight="bold">2 cèl·lules 2n idèntiques</text>
  `;
}

// ── MEIOSI ─────────────────────────────────────────────

function drawMeiosiInterfase(cx = 200, cy = 160) {
  return `
    ${cellBase(cx, cy, 130, 110)}
    ${nucleus(cx, cy, 50)}
    ${chromatin(cx, cy)}
    <text x="${cx}" y="${cy+140}" text-anchor="middle" font-family="Fira Sans Extra Condensed" font-size="13" fill="#666">ADN copiat una sola vegada (vindrà 2 divisions)</text>
    <text x="${cx}" y="${cy+156}" text-anchor="middle" font-family="Fira Sans Extra Condensed" font-size="12" fill="${colors.membrane}" font-weight="bold">2n (amb còpies: 2 × 2n)</text>
  `;
}

function drawProfase1(cx = 200, cy = 155) {
  return `
    ${cellBase(cx, cy, 130, 110)}

// ─────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────

let mode = 'mitosi';
let currentPhase = 0;
let simplified = false;
let lang = null;

// ─────────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────────

function getPhases() { return PHASES[mode] || []; }

function renderTimeline() {
  const tl = document.getElementById('phaseTimeline');
  const phases = getPhases();
  let html = '';

  if (mode === 'meiosi') {
    phases.forEach((p, i) => {
      if (i === 1) html += `<span class="phase-divider">— Meiosi I —</span>`;
      if (i === 5) html += `<span class="phase-divider">— Meiosi II —</span>`;
      if (i === 9) html += `<span class="phase-divider">— Resultat —</span>`;
      html += `<button class="phase-btn${currentPhase === i ? ' active' : ''}" onclick="goTo(${i})">${p.name}</button>`;
      if (i < phases.length - 1) html += `<span class="phase-arrow">→</span>`;
    });
  } else if (mode === 'mitosi') {
    phases.forEach((p, i) => {
      html += `<button class="phase-btn${currentPhase === i ? ' active' : ''}" onclick="goTo(${i})">${p.name}</button>`;
      if (i < phases.length - 1) html += `<span class="phase-arrow">→</span>`;
    });
  }

  tl.innerHTML = html;
}

function renderPhase() {
  if (mode === 'compara') { renderCompara(); return; }

  const phases = getPhases();
  const ph = phases[currentPhase];
  if (!ph) return;

  // SVG
  const svg = document.getElementById('cellSvg');
  svg.style.opacity = 0;
  setTimeout(() => {
    svg.innerHTML = ph.svg();
    svg.style.opacity = 1;
  }, 150);

  // Labels
  document.getElementById('phaseEyebrow').textContent = ph.eyebrow;
  document.getElementById('phaseTitle').textContent = ph.name;

  const notEl = document.getElementById('phaseNotation');
  notEl.innerHTML = ph.notation
    ? `<span class="phase-label-notation">${ph.notation}</span>`
    : '';

  // Side info
  const si = document.getElementById('sideInfo');
  si.innerHTML = `
    <div>
      <div class="info-section-title">Descripció</div>
      <div class="info-text${simplified ? ' simplified' : ''}" id="phaseDesc">
        ${simplified ? ph.simplified : ph.description}
      </div>
    </div>
    <div>
      <div class="info-section-title">Punts clau</div>
      <ul class="key-points">
        ${ph.points.map(p => `<li class="key-point">${p}</li>`).join('')}
      </ul>
    </div>
    <div class="chromosome-legend">
      <div class="info-section-title" style="border-color:var(--rule-dark)">Material genètic</div>
      <div class="legend-row">
        <span class="legend-dot" style="background:#E76F6F"></span>
        <span style="font-size:14px;color:var(--ink-2)">Grup 1 (vermell)</span>
      </div>
      <div class="legend-row">
        <span class="legend-dot" style="background:#6FA3E7"></span>
        <span style="font-size:14px;color:var(--ink-2)">Grup 2 (blau)</span>
      </div>
      <div style="font-size:13px;color:var(--muted);margin-top:6px">Quantitat: <strong style="color:var(--purple-ink)">${ph.chromosomes}</strong></div>
      <div class="notation-badge">${ph.notation || ''}</div>
    </div>
  `;

  // Step counter
  document.getElementById('stepCounter').textContent =
    `Fase ${currentPhase + 1} / ${phases.length}`;

  // Nav buttons
  document.getElementById('btnPrev').disabled = currentPhase === 0;
  document.getElementById('btnNext').disabled = currentPhase === phases.length - 1;
  document.getElementById('btnNext').textContent =
    currentPhase === phases.length - 1 ? 'Fi' : 'Següent →';

  applyLang();
}

function renderCompara() {
  const cellCanvas = document.getElementById('cellCanvas');
  const phaseLabelArea = document.getElementById('phaseLabelArea');
  const sideInfo = document.getElementById('sideInfo');
  const bottomNav = document.querySelector('.bottom-nav');

  cellCanvas.innerHTML = `
    <div class="comparison-grid" style="width:100%">
      <div class="comparison-cell">
        <div class="comparison-header">Mitosi</div>
        <div class="comparison-content">
          <table class="compare-table">
            <tr><th>Característica</th><th>Valor</th></tr>
            <tr><td>Divisions</td><td>1</td></tr>
            <tr><td>Cèl·lules filles</td><td>2</td></tr>
            <tr><td>Ploïdia resultant</td><td>2n (igual que la mare)</td></tr>
            <tr><td>Fases intermèdies</td><td>Profase, Metafase, Anafase, Telofase</td></tr>
            <tr><td>Separació en anafase</td><td>Cromàtides germanes</td></tr>
            <tr><td>Variabilitat genètica</td><td>No (còpies idèntiques)</td></tr>
            <tr><td>Funció</td><td>Creixement, reparació (somàtica)</td></tr>
            <tr><td>On ocorre</td><td>Totes les cèl·lules somàtiques</td></tr>
          </table>
        </div>
      </div>
      <div class="comparison-cell">
        <div class="comparison-header">Meiosi</div>
        <div class="comparison-content">
          <table class="compare-table">
            <tr><th>Característica</th><th>Valor</th></tr>
            <tr><td>Divisions</td><td>2 (Meiosi I + Meiosi II)</td></tr>
            <tr><td>Cèl·lules filles</td><td>4</td></tr>
            <tr><td>Ploïdia resultant</td><td>n (la meitat de la mare)</td></tr>
            <tr><td>Fases intermèdies</td><td>Profase I, Metafase I, Anafase I, Telofase I + Profase II, Metafase II, Anafase II, Telofase II</td></tr>
            <tr><td>Separació en Anafase I</td><td>Cromosomes homòlegs</td></tr>
            <tr><td>Separació en Anafase II</td><td>Cromàtides germanes</td></tr>
            <tr><td>Variabilitat genètica</td><td>Sí (crossing over + assortiment independent)</td></tr>
            <tr><td>Funció</td><td>Gametogènesi (reproducció sexual)</td></tr>
            <tr><td>On ocorre</td><td>Gònades (testicles / ovaris)</td></tr>
          </table>
        </div>
      </div>
    </div>
  `;

  phaseLabelArea.innerHTML = `
    <div class="phase-label-eyebrow">Comparació</div>
    <div class="phase-label-title">Mitosi vs. Meiosi</div>
    <span class="phase-label-notation">2n → 2n (mitosi) · 2n → n (meiosi) · n + n = 2n (fecundació)</span>
  `;

  sideInfo.innerHTML = `
    <div>
      <div class="info-section-title">Diferències fonamentals</div>
      <ul class="key-points">
        <li class="key-point">La meiosi té 2 divisions; la mitosi, 1</li>
        <li class="key-point">La meiosi té Profase I amb aparellament d'homòlegs i crossing over: origen de variabilitat</li>
        <li class="key-point">A l'Anafase I separen homòlegs (no cromàtides); a l'Anafase II i a la mitosi separen cromàtides germanes</li>
        <li class="key-point">Meiosi: 2n → n (reducció de ploïdia). Mitosi: 2n → 2n</li>
        <li class="key-point">Fecundació: n (gàmeta) + n (gàmeta) = 2n (zigot) → manté constant la ploïdia entre generacions</li>
      </ul>
    </div>
    <div>
      <div class="info-section-title">Regla mnemotècnica</div>
      <div class="info-text"><strong>MitoSI → Idèntiques · MeiO → Ovaris/testis</strong><br>Mitosi: 1 divisió, 2 filles, 2n. Meiosi: 2 divisions, 4 filles, n.</div>
    </div>
  `;

  bottomNav.innerHTML = `<div></div><span class="step-counter">Vista comparativa</span><div></div>`;
}

function renderAll() {
  renderTimeline();
  renderPhase();
}

// ─────────────────────────────────────────────────
// CONTROLS
// ─────────────────────────────────────────────────

function setMode(m) {
  mode = m;
  currentPhase = 0;
  document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab' + m.charAt(0).toUpperCase() + m.slice(1)).classList.add('active');

  const tl = document.getElementById('phaseTimeline');
  tl.style.display = m === 'compara' ? 'none' : 'flex';

  const bl = document.querySelector('.bottom-nav');
  bl.style.display = m === 'compara' ? 'none' : 'flex';

  const cv = document.getElementById('cellCanvas');
  cv.style.display = 'flex';
  cv.style.flexWrap = m === 'compara' ? 'wrap' : '';

  if (m !== 'compara') {
    const svg = document.createElement('svg');
    svg.id = 'cellSvg';
    svg.classList.add('cell-diagram');
    svg.setAttribute('viewBox', '0 0 400 320');
    svg.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
    svg.setAttribute('width', '400');
    svg.setAttribute('height', '320');
    cv.innerHTML = '';
    cv.appendChild(svg);
  }

  renderAll();
}

function goTo(i) {
  currentPhase = i;
  renderAll();
}

function navigate(dir) {
  const phases = getPhases();
  currentPhase = Math.max(0, Math.min(phases.length - 1, currentPhase + dir));
  renderAll();
}

function toggleSimplify() {
  simplified = !simplified;
  document.getElementById('btnSimplify').classList.toggle('active', simplified);
  renderPhase();
}

function setLang(l) {
  lang = lang === l ? null : l;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  if (lang) document.getElementById('btn' + l.charAt(0).toUpperCase() + l.slice(1)).classList.add('active');
  applyLang();
}

function applyLang() {
  const body = document.body;
  body.classList.remove('lang-ar', 'lang-es', 'lang-ur');
  if (lang) body.classList.add('lang-' + lang);
}

// Keyboard navigation
document.addEventListener('keydown', e => {
  if (mode === 'compara') return;
  if (e.key === 'ArrowRight') navigate(1);
  if (e.key === 'ArrowLeft') navigate(-1);
});

// Init
renderAll();
</script>
</body>
</html>
