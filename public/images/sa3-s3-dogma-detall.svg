<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 420" font-family="'Fira Sans Extra Condensed','Fira Sans Condensed',sans-serif">
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#22357A"/></marker>
  </defs>
  <rect x="0" y="0" width="880" height="420" fill="#ffffff"/>
  <text x="440" y="30" text-anchor="middle" font-size="22" font-weight="700" fill="#22357A">El camí de l'ADN a la proteïna</text>

  <!-- NUCLI box -->
  <rect x="24" y="60" width="300" height="300" rx="18" fill="#eef1fb" stroke="#5B7BE0" stroke-width="2"/>
  <text x="174" y="86" text-anchor="middle" font-size="16" font-weight="700" fill="#2E4A9E">NUCLI</text>

  <!-- ADN (gene) -->
  <text x="174" y="120" text-anchor="middle" font-size="15" font-weight="700" fill="#22357A">Gen (ADN)</text>
  <g stroke="#2E4A9E" stroke-width="7" stroke-linecap="round">
    <line x1="90" y1="140" x2="258" y2="140"/>
    <line x1="90" y1="162" x2="258" y2="162"/>
  </g>
  <g stroke="#9db0e6" stroke-width="3">
    <line x1="108" y1="140" x2="108" y2="162"/><line x1="132" y1="140" x2="132" y2="162"/>
    <line x1="156" y1="140" x2="156" y2="162"/><line x1="180" y1="140" x2="180" y2="162"/>
    <line x1="204" y1="140" x2="204" y2="162"/><line x1="228" y1="140" x2="228" y2="162"/>
  </g>

  <!-- arrow transcripció -->
  <line x1="174" y1="180" x2="174" y2="228" stroke="#22357A" stroke-width="2.5" marker-end="url(#ah)"/>
  <text x="188" y="208" font-size="14" font-weight="700" fill="#2E7D57">TRANSCRIPCIÓ</text>
  <text x="188" y="224" font-size="11.5" fill="#555">es copia l'ADN a ARN</text>

  <!-- ARNm -->
  <text x="174" y="256" text-anchor="middle" font-size="15" font-weight="700" fill="#2E7D57">ARN missatger</text>
  <line x1="90" y1="276" x2="258" y2="276" stroke="#2E7D57" stroke-width="7" stroke-linecap="round"/>
  <text x="174" y="300" text-anchor="middle" font-size="11.5" fill="#555">una sola cadena · U en lloc de T</text>

  <!-- exits nucleus -->
  <text x="174" y="336" text-anchor="middle" font-size="12" font-weight="700" fill="#2E4A9E">l'ARNm surt del nucli →</text>

  <!-- arrow out -->
  <line x1="324" y1="276" x2="392" y2="276" stroke="#22357A" stroke-width="2.5" marker-end="url(#ah)"/>

  <!-- RIBOSOME + protein (citoplasma) -->
  <text x="600" y="86" text-anchor="middle" font-size="16" font-weight="700" fill="#2E4A9E">CITOPLASMA</text>
  <ellipse cx="470" cy="276" rx="42" ry="34" fill="#dfeee7" stroke="#2E7D57" stroke-width="2"/>
  <text x="470" y="281" text-anchor="middle" font-size="13" font-weight="700" fill="#2E7D57">ribosoma</text>

  <!-- arrow traducció -->
  <line x1="518" y1="276" x2="576" y2="276" stroke="#22357A" stroke-width="2.5" marker-end="url(#ah)"/>
  <text x="512" y="238" font-size="14" font-weight="700" fill="#B5502A">TRADUCCIÓ</text>
  <text x="512" y="254" font-size="11.5" fill="#555">llegeix de 3 en 3 (codons)</text>

  <!-- protein beads -->
  <text x="700" y="240" text-anchor="middle" font-size="15" font-weight="700" fill="#B5502A">Proteïna</text>
  <g fill="#e08a5b" stroke="#B5502A" stroke-width="1.5">
    <circle cx="600" cy="276" r="13"/><circle cx="626" cy="290" r="13"/><circle cx="652" cy="272" r="13"/>
    <circle cx="678" cy="292" r="13"/><circle cx="704" cy="274" r="13"/><circle cx="730" cy="290" r="13"/>
    <circle cx="756" cy="276" r="13"/>
  </g>
  <text x="678" y="318" text-anchor="middle" font-size="11.5" fill="#555">cadena d'aminoàcids</text>

  <!-- arrow to characteristic -->
  <line x1="756" y1="300" x2="756" y2="344" stroke="#22357A" stroke-width="2.5" marker-end="url(#ah)"/>
  <text x="700" y="372" text-anchor="middle" font-size="14" font-weight="700" fill="#22357A">→ CARACTERÍSTICA</text>
  <text x="700" y="390" text-anchor="middle" font-size="11.5" fill="#555">(el que es veu de l'ésser viu)</text>
</svg>
