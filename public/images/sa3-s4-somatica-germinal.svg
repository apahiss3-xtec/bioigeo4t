<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 380" font-family="'Fira Sans Extra Condensed','Segoe UI',sans-serif">
  <defs>
    <style>
      .ink{fill:#1d1622}.muted{fill:#5a5560}.h{font-weight:900}
      .lbl{font-size:15px}.small{font-size:12.5px}.tiny{font-size:11px}
    </style>
    <marker id="a2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#4a4550"/></marker>
    <marker id="ared" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#b5502a"/></marker>
  </defs>

  <text x="390" y="26" text-anchor="middle" class="ink h" font-size="18">Editar el cos o editar un embrió: la diferència que ho canvia tot</text>

  <!-- ROW 1: SOMÀTICA -->
  <g transform="translate(0,44)">
    <rect x="16" y="0" width="748" height="140" rx="12" fill="#eaf6ee" stroke="#8fc4a3"/>
    <text x="34" y="30" fill="#1c6f45" class="h lbl">SOMÀTICA — s'editen cèl·lules del cos (soma)</text>

    <!-- adult -->
    <g transform="translate(60,58)">
      <circle cx="0" cy="0" r="15" fill="#2E7D57"/>
      <rect x="-13" y="16" width="26" height="34" rx="9" fill="#2E7D57"/>
      <rect x="-6" y="8" width="12" height="10" rx="3" fill="#fff" opacity=".85"/>
      <text x="0" y="6" text-anchor="middle" fill="#fff" class="h" font-size="12">✓</text>
    </g>
    <text x="60" y="128" text-anchor="middle" class="muted small">Adult curat</text>

    <line x1="105" y1="80" x2="150" y2="80" stroke="#4a4550" stroke-width="2.5" marker-end="url(#a2)"/>
    <text x="128" y="72" text-anchor="middle" class="muted tiny">té fills</text>

    <!-- children unaffected -->
    <g transform="translate(190,66)">
      <circle cx="0" cy="0" r="11" fill="#9db0e0"/><rect x="-9" y="11" width="18" height="24" rx="6" fill="#9db0e0"/>
    </g>
    <g transform="translate(230,66)">
      <circle cx="0" cy="0" r="11" fill="#9db0e0"/><rect x="-9" y="11" width="18" height="24" rx="6" fill="#9db0e0"/>
    </g>
    <text x="210" y="128" text-anchor="middle" class="muted small">Fills: NO ho hereten</text>

    <rect x="430" y="40" width="316" height="70" rx="10" fill="#fff" stroke="#8fc4a3"/>
    <text x="446" y="66" fill="#1c6f45" class="h small">El canvi es queda EN la persona.</text>
    <text x="446" y="88" class="muted small">Exemple: corregir la medul·la d'un adult malalt.</text>
    <text x="446" y="104" class="muted tiny">Molts països la permeten en investigació.</text>
  </g>

  <!-- ROW 2: GERMINAL -->
  <g transform="translate(0,200)">
    <rect x="16" y="0" width="748" height="150" rx="12" fill="#f6ece8" stroke="#d9a487"/>
    <text x="34" y="30" fill="#a2411f" class="h lbl">GERMINAL — s'edita un embrió o els gàmetes</text>

    <!-- embryo -->
    <g transform="translate(60,64)">
      <circle cx="0" cy="0" r="18" fill="#b5502a"/>
      <circle cx="-6" cy="-4" r="6" fill="#f6ece8" opacity=".7"/>
      <circle cx="7" cy="3" r="6" fill="#f6ece8" opacity=".7"/>
      <circle cx="-3" cy="8" r="5" fill="#f6ece8" opacity=".7"/>
    </g>
    <text x="60" y="112" text-anchor="middle" class="muted small">Embrió editat</text>
    <text x="60" y="128" text-anchor="middle" class="muted tiny">(totes les cèl·lules)</text>

    <line x1="98" y1="64" x2="150" y2="64" stroke="#b5502a" stroke-width="2.5" marker-end="url(#ared)"/>

    <!-- child affected -->
    <g transform="translate(185,58)">
      <circle cx="0" cy="0" r="12" fill="#b5502a"/><rect x="-10" y="12" width="20" height="26" rx="6" fill="#b5502a"/>
    </g>
    <text x="185" y="112" text-anchor="middle" class="muted small">Persona</text>

    <line x1="212" y1="64" x2="252" y2="64" stroke="#b5502a" stroke-width="2.5" marker-end="url(#ared)"/>
    <text x="232" y="52" text-anchor="middle" class="muted tiny">té fills</text>

    <!-- grandchildren affected -->
    <g transform="translate(285,60)"><circle cx="0" cy="0" r="10" fill="#b5502a"/><rect x="-8" y="10" width="16" height="22" rx="5" fill="#b5502a"/></g>
    <g transform="translate(320,60)"><circle cx="0" cy="0" r="10" fill="#b5502a"/><rect x="-8" y="10" width="16" height="22" rx="5" fill="#b5502a"/></g>
    <line x1="335" y1="64" x2="368" y2="64" stroke="#b5502a" stroke-width="2.5" stroke-dasharray="4 4" marker-end="url(#ared)"/>
    <text x="392" y="68" class="muted small">… per sempre</text>

    <rect x="430" y="44" width="316" height="82" rx="10" fill="#fff" stroke="#d9a487"/>
    <text x="446" y="70" fill="#a2411f" class="h small">El canvi PASSA als descendents.</text>
    <text x="446" y="92" class="muted small">Un error no afecta una persona, sinó tota</text>
    <text x="446" y="108" class="muted small">una descendència que no ha pogut consentir-hi.</text>
    <text x="446" y="122" class="muted tiny">Prohibida en humans a molts països (cas bessones, 2018).</text>
  </g>
</svg>
