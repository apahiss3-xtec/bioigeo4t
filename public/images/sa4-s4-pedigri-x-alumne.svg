  <text x="320" y="336" text-anchor="middle" font-size="12.5" fill="#4d6560" font-style="italic">◇ = descendent per determinar (sexe, genotip i si està afectat)</text>
  <rect x="70" y="360" width="500" height="44" rx="10" fill="#e7f4f1" stroke="#a7cfc7" stroke-width="1.5"/>
  <circle cx="98" cy="382" r="10" fill="#fff" stroke="#1E7A70" stroke-width="2"/>
  <text x="115" y="387" font-size="12" fill="#3a3340">dona sana</text>
  <circle cx="212" cy="382" r="10" fill="#fff" stroke="#1E7A70" stroke-width="2"/>
  <path d="M212,372 A10,10 0 0,1 212,392 Z" fill="#9fd8cd"/>
  <text x="229" y="387" font-size="12" fill="#3a3340">portadora</text>
  <rect x="322" y="372" width="20" height="20" fill="#fff" stroke="#1E7A70" stroke-width="2"/>
  <text x="350" y="387" font-size="12" fill="#3a3340">home sa</text>
  <rect x="442" y="372" width="20" height="20" fill="#c96f3e" stroke="#a24e24" stroke-width="2"/>
  <text x="470" y="387" font-size="12" fill="#3a3340">afectat</text>
  <text x="320" y="436" text-anchor="middle" font-size="13" font-weight="700" fill="#17605A">Fes el quadre de Punnett i completa cada descendent amb el seu genotip.</text>
