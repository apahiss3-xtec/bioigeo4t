    <path d="M388,258 l26,26 l-26,26 l-26,-26 z" fill="#fff" stroke="#a7cfc7" stroke-width="2" stroke-dasharray="4 3"/>
    <text x="388" y="292" text-anchor="middle" font-size="24" fill="#b6b0bd">?</text>
    <line x1="525" y1="218" x2="525" y2="252" stroke="#3a3340" stroke-width="2"/>
    <path d="M525,258 l26,26 l-26,26 l-26,-26 z" fill="#fff" stroke="#a7cfc7" stroke-width="2" stroke-dasharray="4 3"/>
    <text x="525" y="292" text-anchor="middle" font-size="24" fill="#b6b0bd">?</text>
