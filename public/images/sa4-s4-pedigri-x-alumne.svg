<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 470" font-family="'Fira Sans Extra Condensed','Segoe UI',sans-serif">
  <rect width="640" height="470" fill="#fefdff"/>
  <text x="320" y="32" text-anchor="middle" font-size="21" font-weight="800" fill="#17605A">Mare portadora × pare sa: quins fills poden tenir?</text>
  <text x="320" y="54" text-anchor="middle" font-size="14" fill="#3a3340">Els pares et donen X amb H (sa) i X amb h (hemofília). Dedueix tu la descendència.</text>
  <text x="34" y="120" font-size="13" font-weight="700" fill="#78707e">Pares</text>
  <text x="34" y="300" font-size="13" font-weight="700" fill="#78707e">Fills?</text>
  <circle cx="210" cy="115" r="26" fill="#fff" stroke="#1E7A70" stroke-width="2.5"/>
  <path d="M210,89 A26,26 0 0,1 210,141 Z" fill="#9fd8cd"/>
  <text x="210" y="168" text-anchor="middle" font-size="15" font-weight="700" fill="#17605A">Mare portadora</text>
  <text x="210" y="189" text-anchor="middle" font-size="16" font-weight="800" fill="#1d1622">X<tspan font-size="10" dy="-6">H</tspan><tspan dy="6"> </tspan>X<tspan font-size="10" dy="-6">h</tspan></text>
  <rect x="404" y="89" width="52" height="52" fill="#fff" stroke="#1E7A70" stroke-width="2.5"/>
  <text x="430" y="168" text-anchor="middle" font-size="15" font-weight="700" fill="#17605A">Pare sa</text>
  <text x="430" y="189" text-anchor="middle" font-size="16" font-weight="800" fill="#1d1622">X<tspan font-size="10" dy="-6">H</tspan><tspan dy="6"> </tspan>Y</text>
  <line x1="236" y1="115" x2="404" y2="115" stroke="#3a3340" stroke-width="2"/>
  <line x1="320" y1="115" x2="320" y2="218" stroke="#3a3340" stroke-width="2"/>
  <line x1="115" y1="218" x2="525" y2="218" stroke="#3a3340" stroke-width="2"/>
  <g>
    <line x1="115" y1="218" x2="115" y2="252" stroke="#3a3340" stroke-width="2"/>
    <path d="M115,258 l26,26 l-26,26 l-26,-26 z" fill="#fff" stroke="#a7cfc7" stroke-width="2" stroke-dasharray="4 3"/>
    <text x="115" y="292" text-anchor="middle" font-size="24" fill="#b6b0bd">?</text>
    <line x1="252" y1="218" x2="252" y2="252" stroke="#3a3340" stroke-width="2"/>
    <path d="M252,258 l26,26 l-26,26 l-26,-26 z" fill="#fff" stroke="#a7cfc7" stroke-width="2" stroke-dasharray="4 3"/>
