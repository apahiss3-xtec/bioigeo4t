<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 380" font-family="'Fira Sans Extra Condensed','Segoe UI',sans-serif">
  <defs>
    <style>
      .ink{fill:#16302c}.mut{fill:#4d6560}.teal{fill:#1E7A70}
      .lbl{font-size:15px;fill:#16302c}.sm{font-size:12.5px;fill:#4d6560}
      .gt{font-size:13px;font-weight:700;fill:#17605A}
      .roman{font-size:14px;font-weight:700;fill:#8aa39e}
      .sym{stroke:#17605A;stroke-width:2.4;fill:#ffffff}
      .symf{stroke:#17605A;stroke-width:2.4;fill:#1E7A70}
      .link{stroke:#5c7a75;stroke-width:2.2;fill:none}
    </style>
  </defs>
  <rect x="0" y="0" width="760" height="380" fill="#ffffff"/>
  <rect x="0" y="0" width="760" height="46" fill="#1E7A70"/>
  <text x="24" y="30" font-size="20" font-weight="800" fill="#ffffff">El pedigrí: símbols i un caràcter que salta una generació</text>

  <!-- ===== LLEGENDA ===== -->
  <rect x="16" y="62" width="266" height="300" rx="12" fill="#EAF5F2" stroke="#bfe0d9" stroke-width="1.5"/>
  <text x="32" y="88" font-size="14" font-weight="800" fill="#17605A" letter-spacing="1">LLEGENDA DELS SÍMBOLS</text>

  <rect class="sym" x="36" y="104" width="30" height="30" rx="3"/>
  <text class="lbl" x="82" y="124">Home</text>
  <circle class="sym" cx="197" cy="119" r="16"/>
  <text class="lbl" x="222" y="124">Dona</text>

  <rect class="symf" x="36" y="150" width="30" height="30" rx="3"/>
  <text class="lbl" x="82" y="170">Té el caràcter</text>

  <rect class="sym" x="36" y="196" width="30" height="30" rx="3"/>
  <text class="lbl" x="82" y="216">No el té</text>

  <line class="link" x1="40" y1="258" x2="86" y2="258"/>
  <text class="sm" x="98" y="262">Línia de parella</text>

  <line class="link" x1="63" y1="286" x2="63" y2="326"/>
  <text class="sm" x="98" y="312">Línia cap als fills</text>

  <text class="sm" x="32" y="352">Genotip: AA i Aa es veuen igual; només aa mostra el recessiu.</text>

  <!-- ===== PEDIGRÍ ===== -->
  <!-- Generacions -->
  <text class="roman" x="312" y="118">I</text>
  <text class="roman" x="312" y="228">II</text>
  <text class="roman" x="312" y="336">III</text>

  <!-- GEN I: avi afectat (aa) x àvia portadora (Aa) -->
  <rect class="symf" x="360" y="98" width="34" height="34" rx="3"/>
  <text class="gt" x="360" y="150">aa</text>
  <circle class="sym" cx="475" cy="115" r="18"/>
  <text class="gt" x="463" y="150">Aa</text>
  <line class="link" x1="394" y1="115" x2="457" y2="115"/>
  <!-- baixada a gen II -->
  <line class="link" x1="434" y1="115" x2="434" y2="150"/>
  <line class="link" x1="434" y1="150" x2="520" y2="150"/>
  <line class="link" x1="520" y1="150" x2="520" y2="188"/>

  <!-- GEN II: fill portador (Aa) x parella de fora portadora (Aa) -->
  <rect class="sym" x="503" y="188" width="34" height="34" rx="3"/>
  <text class="gt" x="503" y="240">Aa</text>
  <circle class="sym" cx="618" cy="205" r="18"/>
  <text class="gt" x="606" y="240">Aa</text>
  <line class="link" x1="537" y1="205" x2="600" y2="205"/>
  <!-- baixada a gen III -->
  <line class="link" x1="577" y1="205" x2="577" y2="240"/>
  <line class="link" x1="500" y1="240" x2="654" y2="240"/>
  <line class="link" x1="500" y1="240" x2="500" y2="286"/>
  <line class="link" x1="654" y1="240" x2="654" y2="286"/>

  <!-- GEN III: dos néts, un afectat (aa) i un sa -->
  <rect class="symf" x="483" y="286" width="34" height="34" rx="3"/>
  <text class="gt" x="483" y="338">aa</text>
  <circle class="sym" cx="654" cy="303" r="18"/>
  <text class="gt" x="636" y="338">AA/Aa</text>

  <!-- nota del salt -->
  <text class="mut" x="326" y="250" font-size="13" font-style="italic">Els pares (gen II) no</text>
  <text class="mut" x="326" y="268" font-size="13" font-style="italic">mostren el caràcter</text>
  <text class="mut" x="326" y="286" font-size="13" font-style="italic">i el tornen a passar</text>
  <text class="mut" x="326" y="304" font-size="13" font-style="italic">al nét afectat.</text>
</svg>