<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 440" font-family="'Fira Sans Extra Condensed','Fira Sans',sans-serif">
  <defs>
    <marker id="arw" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#A66BC9"/>
    </marker>
    <style>
      .lbl{font-size:20px;font-weight:700;fill:#5A2E77;text-anchor:middle}
      .sub{font-size:13px;fill:#7B3F9E;text-anchor:middle}
      .cell{fill:#F3E8FA;stroke:#7B3F9E;stroke-width:2.5}
      .chr{stroke-width:4;stroke-linecap:round}
      .cr1{stroke:#7B3F9E}.cr2{stroke:#C0392B}
      .spin{stroke:#A66BC9;stroke-width:1.4}
    </style>
  </defs>

  <text x="410" y="28" class="lbl" style="font-size:23px">El cicle de la mitosi: una cèl·lula → dues cèl·lules idèntiques</text>

  <!-- INTERFASE highlighted as separate (not part of mitosis) -->
  <rect x="44" y="58" width="112" height="150" rx="12" fill="#EEF7F1" stroke="#2f9aa0" stroke-width="1.6" stroke-dasharray="6 4"/>
  <text x="100" y="74" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1c6f70">FORA DE LA MITOSI</text>
  <g transform="translate(100,140)">
    <ellipse cx="0" cy="0" rx="48" ry="48" class="cell"/>
    <circle cx="0" cy="0" r="24" fill="#EBD6F7" stroke="#7B3F9E" stroke-width="1.6"/>
    <path d="M-13,-7 q9,-9 18,2 M-7,9 q11,7 18,-4" class="cr1 chr" fill="none" stroke-width="2.5"/>
    <text x="0" y="70" class="lbl">Interfase</text>
    <text x="0" y="88" class="sub">creix i copia l'ADN</text>
  </g>

  <!-- PROFASE -->
  <g transform="translate(280,140)">
    <ellipse cx="0" cy="0" rx="52" ry="52" class="cell"/>
    <circle cx="0" cy="0" r="30" fill="none" stroke="#7B3F9E" stroke-width="1.2" stroke-dasharray="4 4"/>
    <path d="M-16,-14 L-4,-2 M-16,-2 L-4,-14" class="cr1 chr"/>
    <path d="M6,4 L18,16 M6,16 L18,4" class="cr2 chr"/>
    <text x="0" y="78" class="lbl">Profase</text>
    <text x="0" y="96" class="sub">cromosomes visibles</text>
  </g>

  <!-- METAFASE -->
  <g transform="translate(460,140)">
    <ellipse cx="0" cy="0" rx="52" ry="52" class="cell"/>
    <line x1="-46" y1="0" x2="46" y2="0" class="spin"/>
    <path d="M-6,-22 L-6,-6 M-14,-22 L-14,-6" class="cr1 chr"/>
    <path d="M6,-22 L6,-6 M14,-22 L14,-6" class="cr2 chr"/>
    <path d="M-6,22 L-6,6 M-14,22 L-14,6" class="cr1 chr"/>
    <path d="M6,22 L6,6 M14,22 L14,6" class="cr2 chr"/>
    <text x="0" y="78" class="lbl">Metafase</text>
    <text x="0" y="96" class="sub">s'alineen al centre</text>
  </g>

  <!-- ANAFASE -->
  <g transform="translate(640,140)">
    <ellipse cx="0" cy="0" rx="56" ry="50" class="cell"/>
    <path d="M-30,-16 L-30,-2 M-38,-16 L-38,-2" class="cr1 chr"/>
    <path d="M30,-16 L30,-2 M38,-16 L38,-2" class="cr2 chr"/>
    <path d="M-30,16 L-30,2 M-38,16 L-38,2" class="cr1 chr"/>
    <path d="M30,16 L30,2 M38,16 L38,2" class="cr2 chr"/>
    <text x="0" y="78" class="lbl">Anafase</text>
    <text x="0" y="96" class="sub">les còpies se separen</text>
  </g>

  <!-- TELOFASE -->
  <g transform="translate(400,335)">
    <ellipse cx="-30" cy="0" rx="42" ry="42" class="cell"/>
    <ellipse cx="30" cy="0" rx="42" ry="42" class="cell"/>
    <circle cx="-30" cy="0" r="20" fill="#EBD6F7" stroke="#7B3F9E" stroke-width="1.4"/>
    <circle cx="30" cy="0" r="20" fill="#EBD6F7" stroke="#7B3F9E" stroke-width="1.4"/>
    <text x="0" y="68" class="lbl">Telofase i citocinesi</text>
    <text x="0" y="86" class="sub">2 cèl·lules filles idèntiques</text>
  </g>

  <text x="440" y="120" font-size="11" fill="#2f9aa0" font-style="italic" text-anchor="middle">◄──────  la mitosi  ──────►</text>

  <line x1="152" y1="140" x2="222" y2="140" stroke="#A66BC9" stroke-width="2.5" marker-end="url(#arw)"/>
  <line x1="338" y1="140" x2="402" y2="140" stroke="#A66BC9" stroke-width="2.5" marker-end="url(#arw)"/>
  <line x1="518" y1="140" x2="578" y2="140" stroke="#A66BC9" stroke-width="2.5" marker-end="url(#arw)"/>
  <path d="M640,192 C640,270 540,285 470,300" fill="none" stroke="#A66BC9" stroke-width="2.5" marker-end="url(#arw)"/>
</svg>
