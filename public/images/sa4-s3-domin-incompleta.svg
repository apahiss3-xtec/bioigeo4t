<line x1="590" y1="196" x2="360" y2="240" stroke="#a7cfc7" stroke-width="2"/>
<text x="360" y="262" text-anchor="middle" font-size="14" font-weight="700" fill="#1d1622">Tots els fills són ROSA — genotip VB</text>
<text x="360" y="281" text-anchor="middle" font-size="12" fill="#4d6560">l'heterozigot té un fenotip INTERMEDI (ni vermell ni blanc)</text>
