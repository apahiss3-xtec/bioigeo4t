<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 340" font-family="'Fira Sans Extra Condensed','Segoe UI',sans-serif">
  <defs>
    <style>
      .ink{fill:#1d1622}.muted{fill:#5a5560}.blue{fill:#2E4A9E}.blueink{fill:#22357A}
      .h{font-weight:900}.lbl{font-size:14px}.small{font-size:12px}
      .strand{fill:none;stroke:#2E4A9E;stroke-width:6;stroke-linecap:round}
      .rung{stroke:#9db0e0;stroke-width:3}
    </style>
    <marker id="arw" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#22357A"/></marker>
  </defs>

  <text x="390" y="26" text-anchor="middle" class="ink h" font-size="18">CRISPR: unes tisores moleculars per editar l'ADN</text>

  <!-- Panel 1: localitzar -->
  <g transform="translate(20,60)">
    <rect x="0" y="0" width="230" height="230" rx="12" fill="#e9eefb" stroke="#b0bde3"/>
    <circle cx="26" cy="26" r="13" class="blue"/><text x="26" y="31" text-anchor="middle" fill="#fff" class="h" font-size="15">1</text>
    <text x="48" y="31" class="blueink h lbl">Localitzar</text>
    <!-- DNA -->
    <path class="strand" d="M20 90 Q115 60 210 90"/>
    <path class="strand" d="M20 150 Q115 180 210 150"/>
    <line class="rung" x1="55" y1="83" x2="55" y2="157"/>
    <line class="rung" x1="90" y1="79" x2="90" y2="161"/>
    <line class="rung" x1="125" y1="78" x2="125" y2="162"/>
    <line class="rung" x1="160" y1="80" x2="160" y2="160"/>
    <line class="rung" x1="195" y1="86" x2="195" y2="154"/>
    <!-- guia -->
    <rect x="108" y="105" width="40" height="30" rx="6" fill="#c8960a" opacity=".25" stroke="#c8960a"/>
    <text x="128" y="205" text-anchor="middle" class="muted small">Troba la seqüència</text>
    <text x="128" y="221" text-anchor="middle" class="muted small">exacta amb la falta</text>
  </g>

  <!-- Panel 2: tallar -->
  <g transform="translate(275,60)">
    <rect x="0" y="0" width="230" height="230" rx="12" fill="#e9eefb" stroke="#b0bde3"/>
    <circle cx="26" cy="26" r="13" class="blue"/><text x="26" y="31" text-anchor="middle" fill="#fff" class="h" font-size="15">2</text>
    <text x="48" y="31" class="blueink h lbl">Tallar</text>
    <path class="strand" d="M20 90 Q75 66 128 84"/>
    <path class="strand" d="M132 84 Q185 100 210 90"/>
    <path class="strand" d="M20 150 Q75 174 128 156"/>
    <path class="strand" d="M132 156 Q185 140 210 150"/>
    <line class="rung" x1="55" y1="84" x2="55" y2="164"/>
    <line class="rung" x1="90" y1="80" x2="90" y2="168"/>
    <line class="rung" x1="170" y1="96" x2="170" y2="146"/>
    <!-- scissors mark -->
    <text x="130" y="128" text-anchor="middle" font-size="26">✂️</text>
    <text x="115" y="205" text-anchor="middle" class="muted small">Fa un tall dirigit</text>
    <text x="115" y="221" text-anchor="middle" class="muted small">al punt exacte</text>
  </g>

  <!-- Panel 3: editar -->
  <g transform="translate(530,60)">
    <rect x="0" y="0" width="230" height="230" rx="12" fill="#eaf6ee" stroke="#8fc4a3"/>
    <circle cx="26" cy="26" r="13" fill="#2E7D57"/><text x="26" y="31" text-anchor="middle" fill="#fff" class="h" font-size="15">3</text>
    <text x="48" y="31" fill="#1c6f45" class="h lbl">Editar</text>
    <path class="strand" style="stroke:#2E7D57" d="M20 90 Q115 60 210 90"/>
    <path class="strand" style="stroke:#2E7D57" d="M20 150 Q115 180 210 150"/>
    <line class="rung" style="stroke:#7bbf97" x1="55" y1="83" x2="55" y2="157"/>
    <line class="rung" style="stroke:#7bbf97" x1="90" y1="79" x2="90" y2="161"/>
    <line class="rung" style="stroke:#7bbf97" x1="125" y1="78" x2="125" y2="162"/>
    <line class="rung" style="stroke:#7bbf97" x1="160" y1="80" x2="160" y2="160"/>
    <line class="rung" style="stroke:#7bbf97" x1="195" y1="86" x2="195" y2="154"/>
    <rect x="108" y="105" width="40" height="30" rx="6" fill="#2E7D57" opacity=".22" stroke="#2E7D57"/>
    <text x="128" y="126" text-anchor="middle" fill="#1c6f45" class="h" font-size="15">✓</text>
    <text x="128" y="205" text-anchor="middle" class="muted small">Canvia la lletra:</text>
    <text x="128" y="221" text-anchor="middle" class="muted small">corregeix la falta</text>
  </g>

  <!-- arrows between -->
  <line x1="252" y1="175" x2="272" y2="175" stroke="#22357A" stroke-width="2.5" marker-end="url(#arw)"/>
  <line x1="507" y1="175" x2="527" y2="175" stroke="#22357A" stroke-width="2.5" marker-end="url(#arw)"/>

  <text x="390" y="326" text-anchor="middle" class="muted small">No inventa un canvi nou: dirigeix, a voluntat, el mateix tipus de canvi d'una lletra que fa una mutació (S3).</text>
</svg>
